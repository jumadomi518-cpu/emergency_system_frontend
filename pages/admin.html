<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      box-sizing: border-box;
    }
  
    header {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      padding: 0.2em 0.5em 0.5em 0.5em;
      margin: 0.5em;
      height: auto;
      box-shadow: 0 0 4px 0 black;
    }
    
    .heading {
      display: grid;
      place-items: center;
      height: 10vh;
    }
  
    
    img {
      height: 10vh;

      
    }
  
    div h2 { 
      padding: 0.5em;
    }
.alerts {
  font-size: 0.8rem;
  margin: 0.3em;
  padding: 0.3em;
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  overflow: scroll;
}

.alerts h2, .alerts p {
  border: 2px solid gray;
  padding: 0.3em;
}
p {
  font-size: 1.3rem;
}
     .analytics {
       font-size: 1.4rem;
       padding: 0.3em;
       margin: 0.3em;
       border: 2px solid green;
     }
     .analytics p {
       font-size: inherit;
       margin: 0.3em;
     }
     span {
       font-size: 1.5rem;
       color: green;
       font-weight: bold;
     }
  </style>
</head>

<body>
  <header>
   <img src="../assets/1771060588592.png" alt="logo" />
<div class="heading">
<h2>Mbiu Emergency Response System Admin Dashboard.</h2>
</div>
</header>
  <main>
    <div class="analytics">
    </div>
    <div class="alerts">
    <h2>#</h2>
    <h2>Name</h2>
    <h2>Phone</h2>
    <h2>Message</h2>
    <h2>Emergency Type</h2>
    <h2>Status</h2>
    <h2>Triggered at</h2>
    <h2>Arrived at</h2>
    <h2>Resolved at</h2>
    <h2>Response time</h2>
    </div>
  </main>
  <script>
    const alerts = document.querySelector(".alerts");
    const analytics = document.querySelector(".analytics");
    function formatSeconds(seconds) {
  if (!seconds) return "0s";
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  return `${h > 0 ? h + "h " : ""}${m > 0 ? m + "m " : ""}${s}s`;
}

function calculateResponseTime(createdTime, arrivalTime) {
  if (!createdTime || !arrivalTime) return null;
  const created = new Date(createdTime);
  const arrived = new Date(arrivalTime);
  const diffMs = arrived - created;
  if (diffMs < 0) return 0;
  const diffSeconds = diffMs / 1000;
  return formatSeconds(diffSeconds);
}
    
    
    
    async function getAnalytics() {
      try {
        const res = await fetch("https://campus-emergency-server.onrender.com/api/analytics");
        const data = await res.json();
        
        analytics.innerHTML = `<p>Total emergencies triggered: <span>${data.totalAlerts}</span></p>
      <p>Active emergencies: <span>${data.active}</span></p>
      <p>Resolved emergencies: <span>${data.resolved}</span></p>
      <p>Pending emergencies: <span>${data.pending}</span></p>
      <p>In progress emergencies: <span>${data.inProgress}</span></p>
          <p>Average response time: <span>${formatSeconds(data.averageTime)}</span></p>
          `;
        
        
      } catch (error) {
        console.log("An error occurred during fetching analytics:", error.message)
      }
      
      }
    
    getAnalytics();
    
    
    async function getAlerts() {
      try {
        const response = await fetch( "https://campus-emergency-server.onrender.com/api/alerts");
        if (!response.ok) {
          throw new Error("The response was not ok");
        }
          const data = await response.json();
          let i = 1;
          for (const n of data) {
            const number = document.createElement("p");
            number.innerText = i;
            const name = document.createElement("p");
            name.innerText = n.name;
            const phone = document.createElement("p");
            phone.innerText = n.phone;
            const message = document.createElement("p");
            message.innerText = n.message;
            const type = document.createElement("p");
            type.innerText = n.emergency_type;
            const status = document.createElement("p");
            status.innerText = n.status;
            const triggered = document.createElement("p");
            triggered.innerText = n.created_at ? new Date(n.created_at).toLocaleString("en-US", {
              year: "numeric",
              month: "short",
              day: "numeric",
               hour: "2-digit",
               minute: "2-digit",
              second: "2-digit",
              hour12: true
              }) : "-pending";
            const arrived = document.createElement("p");
            arrived.innerText = n.arrived_at ? new Date(n.arrived_at).toLocaleString("en-US", {
              year: "numeric",
              month: "short",
              day: "numeric",
               hour: "2-digit",
               minute: "2-digit",
              second: "2-digit",
              hour12: true
              }) : "-pending";
            const resolved = document.createElement("p");
            resolved.innerText = n.resolved_at ? new Date(n.resolved_at).toLocaleString("en-US", {
              year: "numeric",
              month: "short",
              day: "numeric",
               hour: "2-digit",
               minute: "2-digit",
              second: "2-digit",
              hour12: true
              }) : "-pending";
            const responseTime = document.createElement("p");
            responseTime.innerText = n.arrived_at ?  `${calculateResponseTime(n.created_at, n.arrived_at)}` : "-pending";

            
            
            alerts.appendChild(number);
            alerts.appendChild(name);
            alerts.appendChild(phone);
            alerts.appendChild(message);
            alerts.appendChild(type)
            alerts.appendChild(status);
            alerts.appendChild(triggered);
            alerts.appendChild(arrived);
            alerts.appendChild(resolved);
            alerts.appendChild(responseTime);
            i++;
          }
          
          
        
      } catch (error) {
        console.log("An error occurred when fetching alerts ", error.message)
      }
      
      
    }
    
    getAlerts();
  </script>
</body>

</html>
