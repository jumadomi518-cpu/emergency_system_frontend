<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      box-sizing: border-box;
    }
    #map {
      height: 100vh;
    }
    main {
      position: relative;
    }
    .alert {
      width: 30%;
      background-color: whitesmoke;
      font-size: 1.2rem;
      position: absolute;
      right: 1.5rem;
      top: 1.5rem;
      z-index: 1000;
    }
    
    p {
      font-size: inherit;
      padding: 1em;
      border: 2px solid green;
    }

  </style>
</head>

<body>
  <main>
    <div class="alert">
    </div>
  <div id="map"></div>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-rotatedmarker/leaflet.rotatedMarker.js"></script>
  <script>
    const map = L.map("map").setView([0, 0], 2);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
    
    
    navigator.geolocation.getCurrentPosition((pos) => {
      L.marker([pos.coords.latitude, pos.coords.longitude]).bindPopup("your current position").addTo(map);
      map.setView([pos.coords.latitude, pos.coords.longitude], 16);
    }, (error) => {
      console.log("An error occurred while accessing current position ", error.message)
    }, {
      enableHighAccuracy: true
    })
    
    
    async function getAlerts() {
  try {
    const response = await fetch("https://campus-emergency-server.onrender.com/api/alerts");
    if (!response.ok) throw new Error("The network was not ok.");

    const data = await response.json();
    let selectedRing = L.circleMarker([0, 0], {
  radius: 40,
  color: "blue",
  weight: 5,
  fillOpacity: 0,
  dashArray: "5,5"
}).addTo(map);
    
    for (const n of data) {

  const red = Math.floor(Math.random() * 256);
  const green = Math.floor(Math.random() * 256);
  const blue = Math.floor(Math.random() * 256);

  const marker = L.marker([n.latitude, n.longitude], {
    icon: L.divIcon({
      className: "marker",
      html: `<div style="
      width: 40px;
      height: 50px;
      border-top-right-radius: 50%;
      border-bottom-right-radius: 50%;
      border-top-left-radius: 50%;
      transform: rotate(-45deg);
      background: rgb(${red}, ${green}, ${blue});"></div>`,
      iconSize: [34, 34]
    })
  }).addTo(map);

  const date = new Date(n.created_at).toLocaleString("en-US", {
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: true
  });

  marker.on("click", () => {

    selectedRing.setLatLng(marker.getLatLng());

  document.querySelector(".alert").innerHTML =  `<p>${n.emergency_type} was reported on ${date}</p>`

  });

}
    
} catch (error) {
  console.log("An error appeared while fetching alerts ", error.message)
}
}

getAlerts();
  </script>
</body>

</html>
