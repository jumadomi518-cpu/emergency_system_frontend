<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      box-sizing: border-box;
    }
    #map {
      height: 100vh;
    }
    main {
      position: relative;
    }
    .alert {
      padding: 1em;
      width: 30%;
      background-color: whitesmoke;
      font-size: 1.2rem;
      border: 2px solid black;
      position: absolute;
      right: 1.5rem;
      top: 1.5rem;
      z-index: 1000;
    }
    
  </style>
</head>

<body>
  <main>
  <div id="map"></div>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-rotatedmarker/leaflet.rotatedMarker.js"></script>
  <script>
    const map = L.map("map").setView([0, 0], 2);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
    
    
    async function getAlerts() {
      try {
        const response = await fetch("https://campus-emergency-server.onrender.com/api/alerts");
        if (!response.ok) {
        throw new Error("The network was not ok.");
        }
        const data = await response.json();
       for (const n of data) {
         const marker = L.marker([n.latitude, n.longitude]).addTo(map);
         const date = new Date(n.created_at).toLocaleString("en-US", {
              year: "numeric",
              month: "short",
              day: "numeric",
               hour: "2-digit",
               minute: "2-digit",
              second: "2-digit",
              hour12: true
              });
          marker.on("click", () => {
            const div = document.createElement("div");
            div.className = "alert";
            const p = document.createElement("p");
            p.innerText = `${n.emergency_type} reported on ${date}`;
            div.appendChild(p);
            document.querySelector("main").appendChild(div);
          })
         
       }
        
      } catch (error) {
        console.log("An error occurred while fetching alerts ", error.message);
      }
    }
    
    getAlerts();
  </script>
</body>

</html>
