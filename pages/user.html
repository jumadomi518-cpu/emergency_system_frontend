<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Campus Emergency</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
  
  * {
    padding: 0;
    margin: 0;
    font-family: "Poppins", sans-serif;
    box-sizing: border-box;
    
  }
  

header {
      display: flex;
      justify-content: space-between;
      font-size: 1.2rem;
      padding: 0.2em 0.5em 0.5em 0.5em;
      margin: 0.5em;
      height: auto;
      box-shadow: 0 0 4px 0 black;
    }
    
  .logout {
    display: flex;
    justify-content: space-between;
    padding-right: 0.7em;
    padding-left: 0.7em;
  }
    
    .heading {
      display: grid;
      place-items: center;
      height: 10vh;
    }
    h1 {
    font-size: 1.7rem;
    padding-left: 0.3em;
    }
    
    img {
      height: 10vh;

      
    }



  
.scale {
  height: 0;
  overflow: hidden;
}


.show {
  display: flex;
}

  
  .content section {
    display: flex;
    justify-content: space-between;
    padding: 1.5em;
  }
  
  .buttonsParent {
    width: 100%;
  }

  
#etaDisplay {
  font-size: 1.4rem;
  padding: 0.6em;
  box-shadow: 0 0 3px 0 black;
  border-radius: 0.3em;
  width: 50%;
  margin-left: 0.2em;
}
  
  #logo {
    height: 10vh;
  }
  
  

.submit:active {
  background-color: green;
  color: white;
}
  
  .msgCont {
    padding: 1.5em;
    display: grid;
    place-items: center;
  }
  textarea {
    font-size: 1.3rem;
    width: 80%;
    padding: 0.3em;
    border-radius: 0.5em;
    border-color: red;
  }
  
  .emergencyBtnContainer {
    display: grid;
    place-items: center;
    padding: 1em;
  }
    .emergencyBtnContainer button {
      font-size: 1.8rem;
      padding: 0.3em;
      width: 50%;
      border-radius: 5%;
      background-color: rgba(250, 0, 0, 0.2);
      color: crimson;
    }
  .tracking {
    font-size: 1.3rem;
    display: flex;
    justify-content: space-between;
    padding: 2em 1em 2em 1em;
  }
  
  .tracking button {
    
    padding: 0.2em;
    border-radius: 0.2em;
    border: none;
    background-color: purple;
    color: white;
    font-size: 1.1rem;
    padding: 0.4em;
    
  }
  
  .buttons {
      padding: 2em;
      box-shadow: 0 0 4px 0 black;
    }
    
    .buttons div {
      display: flex;
      justify-content: space-between;
    }
    
.buttons button, .icon {
      font-size: 1.5rem;
      text-align: left;
      padding: 0.3em;
      margin-top: 0.5em;
    }
    
   .buttons button {
      width: 80%;
      background-color: green;
      color: white;
      border: 2px solid green;
    }
    
    .icon {
      width: 20%;
      display: grid;
      place-items: center;
      border: 2px solid green;
      border-right: none;
    }
    
 /* button {
    border: none;
  }
  */
  button:active {
    background-color: black;
  }
  
a {
font-size: 1.3rem;
 }  
  
  .map {
    height: 50vh;
    border: 2px solid black;
  }
  
  .expand {
  height: 90vh;
}

.status div {
  padding: 1em;
}
  .status {
    font-size: 1.4rem;
    display: flex;
    justify-content: space-between;
  }
  
  .color {
    background-color: red !important;
  }
  
  .pulsing-responder {
  animation: pulse 1.5s infinite;
  border-radius: 50%;
}
.voteContainer {
  font-size: 1.4rem !important;
  padding: 0.5em;
  display: flex;
  border: 2px solid green;
  flex-direction: column;
  margin: 4em 2em 2em 2em;
  border-radius: 1em;
}

.voteParent {
  margin-top: 0.5em;
  display: flex;
  justify-content: space-between;
  padding: 0.7em;
  font-size: 1.4rem;
}
.true, .false {
  padding: 0.5em;
  border-radius: 0.4em;
  font-size: 1.4rem;
}

.true {
  background-color: green;
  color: white;
}
.false {
  background-color: red;
  color: white;
}
.true:active, .false:active {
  background-color: black;
}
  footer {
    text-align: center;
    font-size: 0.8rem !important;
    width: 100%;
    padding-top: 0.5em;
  }
  footer p {
    font-size: inherit;
  }
  
@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.5; }
  100% { transform: scale(1); opacity: 1; }
}  


  </style>
    <link rel="stylesheet" href="../lib/fontawesome/css/all.css" />
</head>
<body>

  
  <section class="content">
  <header>
    <img src="../assets/1771060588592.png" id="logo" />
    <div class="heading">
<h1>Emergency Response System.</h1>
    </div>
  </header>
  <div class="logout"><a href="../pages/emergency-areas.html">hotspots</a><a href="https://mbiu.space/">Log out</a></div>
<section class="ambuAncestor">
  
  <div class="buttonsParent">
        <div class="buttons">
      <div><p class="icon"><i class="fas fa-ambulance"></i></p><button>Medical</button></div>
      <div><p class="icon"><i class="fas fa-car-crash"></i></p><button id="accident">Accident</button></div>
      <div><p class="icon"><i class="fas fa-fire"></i></p><button id="fire">Fire</button></div>
  <div><p class="icon"><i class="fas fa-user-shield"></i></p><button id="robbery">Crime</button></div>
<div><p class="icon"><i class="fas fa-volcano"></i></p><button>Disaster</button></div>
      
    </div>
  </div>
</section>

<div class="msgCont">
<textarea id="msg" placeholder="Additional information..."></textarea>
</div>

<div class="emergencyBtnContainer">
<button onclick="trigger()" class="submit">Submit</button>
</div>
<div class="tracking">
<button onclick="start()">Start location sharing</button>
<button onclick="stop()">Stop location sharing</button>
</div>
  </section>
<div class="status">
  <div>
  Status: Location <span id="statusText">OFF</span>
  </div>
  <div class="show">
   ⛶
</div>
</div>
<div id="etaDisplay"></div>
<div id="map" class="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-rotatedmarker/leaflet.rotatedMarker.js"></script>
<script src="../js/app.js">
</script>
<footer>
  <p>&copy; 2026 Mbiu. All rights reserved.</p>
</footer>
<div id="debugPanel" style="
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  max-height: 200px;
  overflow-y: auto;
  background: rgba(0,0,0,0.7);
  color: white;
  font-size: 12px;
  z-index: 9999;
  padding: 5px;
  display: none;
  font-family: monospace;
"></div>

</body>
</html>
